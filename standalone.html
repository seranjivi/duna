<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duanamize - Standalone Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap');
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = Motion;
        const { Home, Target, BrainCircuit, Menu, X, ChevronRight } = Lucide;

        const serif = {
            fontFamily: '"Playfair Display", Georgia, Cambria, "Times New Roman", serif',
        };

        // Simple placeholder components for each page
        const HomePage = () => (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8">
                <div className="max-w-4xl mx-auto">
                    <h1 style={serif} className="text-5xl font-bold text-slate-900 mb-6">Home Page</h1>
                    <div className="bg-white rounded-2xl shadow-xl p-8">
                        <h2 className="text-2xl font-semibold mb-4">Welcome to Duanamize</h2>
                        <p className="text-slate-600 mb-4">Transform Your Business with AI-Powered Excellence, Resilience, Scale, and Innovation.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-blue-50 p-4 rounded-xl">
                                <h3 className="font-semibold text-blue-900">Services</h3>
                                <p className="text-blue-700">AI Strategy, Automation, Data Engineering</p>
                            </div>
                            <div className="bg-green-50 p-4 rounded-xl">
                                <h3 className="font-semibold text-green-900">Industries</h3>
                                <p className="text-green-700">Manufacturing, Financial Services, Healthcare</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ApproachPage = () => (
            <div className="min-h-screen bg-gradient-to-br from-emerald-50 to-teal-100 p-8">
                <div className="max-w-4xl mx-auto">
                    <h1 style={serif} className="text-5xl font-bold text-slate-900 mb-6">Approach</h1>
                    <div className="bg-white rounded-2xl shadow-xl p-8">
                        <h2 className="text-2xl font-semibold mb-4">Our Methodology</h2>
                        <div className="space-y-4">
                            <div className="border-l-4 border-blue-500 pl-4">
                                <h3 className="font-semibold text-lg">LSS+AI Methodology</h3>
                                <p className="text-slate-600">Combining Lean Six Sigma discipline with AI-enabled analysis</p>
                            </div>
                            <div className="border-l-4 border-green-500 pl-4">
                                <h3 className="font-semibold text-lg">Our Process</h3>
                                <p className="text-slate-600">Structured delivery model from discovery to optimization</p>
                            </div>
                            <div className="border-l-4 border-purple-500 pl-4">
                                <h3 className="font-semibold text-lg">Technology Stack</h3>
                                <p className="text-slate-600">Enterprise architecture for process improvement</p>
                            </div>
                            <div className="border-l-4 border-orange-500 pl-4">
                                <h3 className="font-semibold text-lg">Outcomes Framework</h3>
                                <p className="text-slate-600">Measurement-led value realization</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const LSSAIPage = () => (
            <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-8">
                <div className="max-w-4xl mx-auto">
                    <h1 style={serif} className="text-5xl font-bold text-slate-900 mb-6">LSS+AI Revolution</h1>
                    <div className="bg-white rounded-2xl shadow-xl p-8">
                        <h2 className="text-2xl font-semibold mb-4">AI-Enhanced Lean Six Sigma</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="text-center">
                                <div className="text-3xl font-bold text-blue-600">40%</div>
                                <p className="text-slate-600">Faster improvement cycles</p>
                            </div>
                            <div className="text-center">
                                <div className="text-3xl font-bold text-green-600">60%</div>
                                <p className="text-slate-600">More accurate root-cause identification</p>
                            </div>
                            <div className="text-center">
                                <div className="text-3xl font-bold text-purple-600">35%</div>
                                <p className="text-slate-600">Greater sustainability of improvements</p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-4 rounded-xl">
                                <h3 className="font-semibold text-blue-900">Automated Data Processing</h3>
                                <p className="text-blue-700">AI-powered systems continuously gather and process data</p>
                            </div>
                            <div className="bg-gradient-to-r from-green-50 to-emerald-50 p-4 rounded-xl">
                                <h3 className="font-semibold text-green-900">Intelligent Root-Cause Analysis</h3>
                                <p className="text-green-700">Machine learning evaluates multi-variable dependencies</p>
                            </div>
                            <div className="bg-gradient-to-r from-purple-50 to-pink-50 p-4 rounded-xl">
                                <h3 className="font-semibold text-purple-900">Predictive Process Optimization</h3>
                                <p className="text-purple-700">Forecast risk and recommend preventive action</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const tabs = [
            {
                id: 'home',
                label: 'Home',
                icon: Home,
                component: HomePage,
                description: 'Main landing page with services overview'
            },
            {
                id: 'approach',
                label: 'Approach',
                icon: Target,
                component: ApproachPage,
                description: 'Our methodology and delivery framework'
            },
            {
                id: 'lss-ai',
                label: 'LSS+AI Revolution',
                icon: BrainCircuit,
                component: LSSAIPage,
                description: 'AI-enhanced Lean Six Sigma methodology'
            }
        ];

        function TabNavigation({ activeTab, setActiveTab, isMobileMenuOpen, setIsMobileMenuOpen }) {
            return (
                <>
                    <nav className="hidden lg:flex items-center gap-1 bg-white/95 backdrop-blur-sm rounded-2xl border border-slate-200 shadow-lg p-1">
                        {tabs.map((tab) => {
                            const Icon = tab.icon;
                            return (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`
                                        relative flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium text-sm transition-all duration-200
                                        ${activeTab === tab.id 
                                            ? 'bg-gradient-to-r from-[#0A2463] to-blue-600 text-white shadow-md' 
                                            : 'text-slate-600 hover:text-slate-900 hover:bg-slate-50'
                                        }
                                    `}
                                >
                                    <Icon className="h-4 w-4" />
                                    <span>{tab.label}</span>
                                    {activeTab === tab.id && (
                                        <motion.div
                                            layoutId="activeTab"
                                            className="absolute inset-0 bg-gradient-to-r from-[#0A2463] to-blue-600 rounded-xl -z-10"
                                            transition={{ type: "spring", bounce: 0.2, duration: 0.6 }}
                                        />
                                    )}
                                </button>
                            );
                        })}
                    </nav>

                    <button
                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        className="lg:hidden flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white/95 backdrop-blur-sm border border-slate-200 shadow-lg"
                    >
                        {isMobileMenuOpen ? <X className="h-5 w-5" /> : <Menu className="h-5 w-5" />}
                        <span className="font-medium text-sm">Menu</span>
                    </button>

                    <AnimatePresence>
                        {isMobileMenuOpen && (
                            <motion.div
                                initial={{ opacity: 0, y: -10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                className="lg:hidden absolute top-full left-4 right-4 mt-2 bg-white/95 backdrop-blur-sm rounded-2xl border border-slate-200 shadow-lg overflow-hidden z-50"
                            >
                                {tabs.map((tab) => {
                                    const Icon = tab.icon;
                                    return (
                                        <button
                                            key={tab.id}
                                            onClick={() => {
                                                setActiveTab(tab.id);
                                                setIsMobileMenuOpen(false);
                                            }}
                                            className={`
                                                w-full flex items-center gap-3 px-4 py-3 text-left transition-colors
                                                ${activeTab === tab.id 
                                                    ? 'bg-gradient-to-r from-[#0A2463] to-blue-600 text-white' 
                                                    : 'text-slate-600 hover:bg-slate-50'
                                                }
                                                ${tab.id !== tabs[tabs.length - 1].id ? 'border-b border-slate-100' : ''}
                                            `}
                                        >
                                            <Icon className="h-4 w-4" />
                                            <div className="flex-1">
                                                <div className="font-medium text-sm">{tab.label}</div>
                                                <div className={`text-xs ${activeTab === tab.id ? 'text-blue-100' : 'text-slate-500'}`}>
                                                    {tab.description}
                                                </div>
                                            </div>
                                            {activeTab === tab.id && <ChevronRight className="h-4 w-4" />}
                                        </button>
                                    );
                                })}
                            </motion.div>
                        )}
                    </AnimatePresence>
                </>
            );
        }

        function TabIndicator({ activeTab }) {
            const currentTab = tabs.find(tab => tab.id === activeTab);
            const Icon = currentTab?.icon;
            
            return (
                <motion.div
                    key={activeTab}
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: -20 }}
                    className="flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-[#0A2463]/10 to-blue-600/10 rounded-xl border border-[#0A2463]/20"
                >
                    <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-r from-[#0A2463] to-blue-600 text-white">
                        <Icon className="h-5 w-5" />
                    </div>
                    <div>
                        <div className="font-semibold text-slate-900">{currentTab?.label}</div>
                        <div className="text-sm text-slate-600">{currentTab?.description}</div>
                    </div>
                </motion.div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const ActiveComponent = tabs.find(tab => tab.id === activeTab)?.component;

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-lg border-b border-slate-200">
                        <div className="mx-auto max-w-7xl px-4 py-4 md:px-8">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="relative h-10 w-10 rounded-full bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-700 shadow-lg shadow-blue-900/30 ring-1 ring-white/25">
                                        <div className="absolute inset-1 rounded-full border border-white/30" />
                                        <div className="absolute inset-0 grid place-items-center text-lg font-black text-white">D</div>
                                    </div>
                                    <div>
                                        <div className="text-slate-900 font-semibold tracking-wide leading-tight">DUANAMIZE</div>
                                        <div className="text-[11px] tracking-[0.18em] text-slate-500">GLOBAL SERVICES</div>
                                    </div>
                                </div>

                                <TabNavigation 
                                    activeTab={activeTab} 
                                    setActiveTab={setActiveTab}
                                    isMobileMenuOpen={isMobileMenuOpen}
                                    setIsMobileMenuOpen={setIsMobileMenuOpen}
                                />
                            </div>

                            <div className="mt-4">
                                <AnimatePresence mode="wait">
                                    <TabIndicator activeTab={activeTab} />
                                </AnimatePresence>
                            </div>
                        </div>
                    </header>

                    <main className="relative">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={activeTab}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.3, ease: "easeInOut" }}
                            >
                                {ActiveComponent && <ActiveComponent />}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    <footer className="sticky bottom-0 z-30 bg-white/95 backdrop-blur-lg border-t border-slate-200">
                        <div className="mx-auto max-w-7xl px-4 py-3 md:px-8">
                            <div className="flex items-center justify-center gap-2">
                                {tabs.map((tab) => {
                                    const Icon = tab.icon;
                                    return (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`
                                                flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-medium transition-all
                                                ${activeTab === tab.id 
                                                    ? 'bg-gradient-to-r from-[#0A2463] to-blue-600 text-white' 
                                                    : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'
                                                }
                                            `}
                                        >
                                            <Icon className="h-3.5 w-3.5" />
                                            <span className="hidden sm:inline">{tab.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
